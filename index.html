<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>QUANTA FUN GAME</title>
<link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<div class="app-credit">
  by Idayya671
</div>

<body>

<!-- ===== MENU AWAL ===== -->
<div id="menu">
  <h1>🎮 QUANTA FUN GAME</h1>
  <p>Bermain sambil belajar Grafik Fungsi Kuadrat</p>

  <div class="ilustrasi"></div>

  <button onclick="startGame()">▶️ MULAI GAME</button>
</div>

<!-- ===== GAME ===== -->
<canvas id="gameCanvas" class="hidden"></canvas>

<!-- ===== CONTROL ===== -->
<div id="controls" class="hidden">
  <button id="left">⬅️</button>
  <button id="up">⬆️</button>
  <button id="right">➡️</button>
</div>

<!-- ===== QUIZ ===== -->
<div id="quizBox" class="hidden">
  <h3 id="question"></h3>
  <div id="answers"></div>
</div>

<!-- ===== UI ===== -->
<div id="ui" class="hidden">
  ⭐ <span id="star">0</span> |
  🪙 <span id="coins">0</span>
</div>

<!-- ===== FEEDBACK ===== -->
<div id="feedbackBox" class="hidden"></div>

<!-- ===== RESULT ===== -->
<div id="resultBox" class="hidden"></div>

<script src="script.js"></script>
</body>
</html>
